name: Multi-Environment Automated Deployment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: |
        docker build -t devops-cicd-labs-image:latest .
        echo "🎉 Docker image verification passed!"

    # Connects to your AWS instance using the secret key we just saved
    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 100.53.42.211
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p ~/app
          
          # Tear down old instances of the container to prevent port clashing
          sudo docker stop devops-cicd-container || true
          sudo docker rm devops-cicd-container || true
          
          # Launch a live web container on the default web port 80
          sudo docker run -d -p 80:80 --name devops-cicd-container devops-cicd-labs-image:latest