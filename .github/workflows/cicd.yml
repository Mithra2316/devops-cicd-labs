name: DevOps CI/CD Pipeline

# 1. Trigger the workflow every time code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 2. Tell GitHub to spin up a fresh, virtual Ubuntu Linux computer in the cloud
    runs-on: ubuntu-latest

    steps:
    # 3. Pull down your repository code onto that virtual machine
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 4. Spin up Docker on the virtual machine and test-build your image
    - name: Build Docker Image
      run: |
        docker build -t devops-cicd-labs-image:latest .
        echo "🎉 Success! The Docker image built perfectly without errors."